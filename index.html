<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fleet Manager - Login test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial;background:#eef2f7;margin:0;padding:30px;}
    .card{max-width:520px;margin:0 auto;background:#fff;padding:16px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.12);}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5e1;margin:6px 0;font-size:14px;}
    button{background:#2563eb;color:#fff;border:none;font-weight:700;cursor:pointer;}
    button:hover{background:#1e40af;}
    .err{color:#dc2626;font-weight:700;margin-top:8px;}
    .ok{color:#16a34a;font-weight:700;margin-top:8px;}
    code{background:#f1f5f9;padding:2px 6px;border-radius:8px;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Prihlásenie (test)</h2>
    <div style="color:#475569;font-size:13px;margin-bottom:10px;">
      Ak toto funguje, problém nie je Supabase, ale pôvodný HTML kód.
    </div>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Heslo" />
    <button id="loginBtn">Prihlásiť</button>

    <div id="msg"></div>

    <div style="margin-top:12px;color:#475569;font-size:12px;">
      URL: <code>mccxzzlhllwrfacpzuxo.supabase.co</code>
    </div>
  </div>

<script>
  const SUPABASE_URL = "https://mccxzzlhllwrfacpzuxo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_QqodPtb4nFmB20IZkAn5Jg_My3ujAm8";

  // DÔLEŽITÉ: len 1x!
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const msg = document.getElementById("msg");
  const setMsg = (text, ok=false) => {
    msg.className = ok ? "ok" : "err";
    msg.textContent = text;
  };

  document.getElementById("loginBtn").addEventListener("click", async () => {
    msg.textContent = "";
    try{
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if(error) throw error;
      setMsg("OK ✅ Prihlásený: " + (data.user?.email || ""), true);
      console.log("session:", data);
    }catch(e){
      console.error(e);
      setMsg("Chyba: " + (e?.message || String(e)));
    }
  });
</script>
</body>
</html>
